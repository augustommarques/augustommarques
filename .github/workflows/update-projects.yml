name: Update Projects in README

on:
  schedule:
    - cron: '0 6 * * *' # every day at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-projects:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build projects list with GitHub API
        id: build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const username = 'augustommarques';

            // Fetch repositories (public, non-fork, non-archived)
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username,
              per_page: 100,
              sort: 'updated'
            });

            const filtered = repos
              .filter(r => !r.fork && !r.archived && !r.private)
              .sort((a, b) => new Date(b.pushed_at) - new Date(a.pushed_at))
              .slice(0, 8);

            const lines = filtered.map(r => `- [${r.name}](${r.html_url}): ${r.description ? r.description.trim() : 'Sem descrição.'}`);

            const readmePath = path.join(process.cwd(), 'README.md');
            const original = fs.readFileSync(readmePath, 'utf8');

            function replaceBlock(content, startMarker, endMarker, lines) {
              const pattern = new RegExp(`${startMarker}[\\s\\S]*?${endMarker}`);
              const newBlock = `${startMarker}\n${lines.join('\n')}\n${endMarker}`;
              if (pattern.test(content)) {
                return content.replace(pattern, newBlock);
              }
              return `${content.trim()}\n\n${newBlock}\n`;
            }

            // Update featured/development projects block
            let updated = replaceBlock(original, '<!-- PROJECTS:START -->', '<!-- PROJECTS:END -->', lines);

            // Build issues-open block
            const issuesOpen = repos
              .filter(r => !r.fork && !r.archived && !r.private && r.open_issues_count > 0)
              .sort((a, b) => b.open_issues_count - a.open_issues_count)
              .map(r => `- [${r.name}](${r.html_url}) — issues abertas: ${r.open_issues_count}`);

            updated = replaceBlock(updated, '<!-- ISSUES_OPEN:START -->', '<!-- ISSUES_OPEN:END -->', issuesOpen.length ? issuesOpen : ['- Nenhum projeto com issues abertas no momento.']);

            if (updated !== original) {
              fs.writeFileSync(readmePath, updated, 'utf8');
              core.setOutput('changed', 'true');
            } else {
              core.setOutput('changed', 'false');
            }

      - name: Commit changes
        if: steps.build.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs(readme): atualizar projetos em desenvolvimento via API'
          file_pattern: README.md

